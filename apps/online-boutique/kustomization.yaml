apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: online-boutique

resources:
  - namespace.yaml
  - kubernetes-manifests.yaml

patches:
  - target:
      version: v1
      kind: Service
      name: frontend-external
    patch: |-
      - op: replace
        path: /spec/type
        value: NodePort
      - op: add
        path: /spec/ports/0/nodePort
        value: 31500
